<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Tym Video Upload</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            margin-bottom: 10px;
            color: #ff6b35;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
        }
        .drop-zone {
            border: 2px dashed #ff6b35;
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 107, 53, 0.1);
        }
        .drop-zone:hover {
            background: rgba(255, 107, 53, 0.2);
            transform: scale(1.02);
        }
        .drop-zone p {
            margin: 0;
            font-size: 18px;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #ff8c5a;
            transform: scale(1.05);
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .status.success {
            background: rgba(0, 255, 0, 0.2);
            display: block;
        }
        .status.error {
            background: rgba(255, 0, 0, 0.2);
            display: block;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Take Tym Video Upload</h1>
        <p class="subtitle">Upload your videos for AI processing</p>
        
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p>📁 Click to select a video<br>or drag & drop here</p>
        </div>
        
        <input type="file" id="fileInput" accept="video/*" onchange="uploadFile(this.files[0])">
        
        <button class="btn" onclick="document.getElementById('fileInput').click()">Select Video</button>
        
        <div id="status" class="status"></div>
        
        <div class="footer">
            <p>Supported: MP4, MOV, AVI, WEBM</p>
            <p>Max size: 500MB</p>
        </div>
    </div>

    <script>
        function uploadFile(file) {
            if (!file) return;
            
            const status = document.getElementById('status');
            status.className = 'status';
            status.textContent = 'Uploading... ' + file.name;
            status.style.display = 'block';
            
            const formData = new FormData();
            formData.append('video', file);
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = '✅ Uploaded! ' + file.name + ' is ready for processing!';
                } else {
                    throw new Error('Upload failed');
                }
            })
            .catch(error => {
                status.className = 'status error';
                status.textContent = '❌ Error: ' + error.message;
            });
        }
    </script>
</body>
</html>
